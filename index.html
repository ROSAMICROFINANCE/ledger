@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

:root{
  --paper:#F6F3EC;
  --card:#FFFEFB;
  --ink:#22281F;
  --ink-soft:#5C6355;
  --rule:#DCD5C4;
  --brass:#A97A2F;
  --brass-deep:#8A6222;
  --green:#3C6E47;
  --green-bg:#E7EFE6;
  --red:#A13D2E;
  --red-bg:#F5E4DF;
  --amber-bg:#F4E9D3;
  --shadow: 0 1px 2px rgba(34,40,31,0.06), 0 4px 14px rgba(34,40,31,0.05);
}

*{box-sizing:border-box;}
#mlt-root{
  font-family:'IBM Plex Sans',sans-serif;
  color:var(--ink);
  background:var(--paper);
  min-height:100%;
  -webkit-font-smoothing:antialiased;
}
#mlt-root .mono{font-family:'IBM Plex Mono',monospace;}
#mlt-root h1,#mlt-root h2,#mlt-root h3{font-family:'Fraunces',serif;font-weight:600;margin:0;}
#mlt-root .layout{display:flex;min-height:600px;}
#mlt-root .sidebar{
  width:180px;flex-shrink:0;background:var(--ink);color:#EDE9DD;
  padding:22px 14px;display:flex;flex-direction:column;gap:4px;
}
#mlt-root .brand{font-family:'Fraunces',serif;font-size:18px;font-weight:700;color:#F6F3EC;margin-bottom:2px;letter-spacing:0.2px;}
#mlt-root .brand-sub{font-family:'IBM Plex Mono',monospace;font-size:10px;color:#9BA48C;text-transform:uppercase;letter-spacing:1.2px;margin-bottom:20px;}
#mlt-root .nav-btn{
  text-align:left;background:none;border:none;color:#C9C4B4;padding:9px 10px;border-radius:6px;
  font-family:'IBM Plex Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:background .15s, color .15s;
}
#mlt-root .nav-btn:hover{background:rgba(255,255,255,0.06);color:#F6F3EC;}
#mlt-root .nav-btn.active{background:var(--brass);color:#1D1608;font-weight:600;}
#mlt-root .main{flex:1;padding:26px 30px;overflow-x:auto;}
#mlt-root .topline{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:18px;flex-wrap:wrap;gap:8px;}
#mlt-root .today{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--ink-soft);}

#mlt-root .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:24px;}
#mlt-root .card{background:var(--card);border:1px solid var(--rule);border-radius:8px;padding:14px 16px;box-shadow:var(--shadow);}
#mlt-root .card .label{font-size:11px;text-transform:uppercase;letter-spacing:0.8px;color:var(--ink-soft);margin-bottom:6px;}
#mlt-root .card .value{font-family:'IBM Plex Mono',monospace;font-size:22px;font-weight:600;}
#mlt-root .card.warn .value{color:var(--red);}
#mlt-root .card.good .value{color:var(--green);}

#mlt-root .panel{background:var(--card);border:1px solid var(--rule);border-radius:8px;box-shadow:var(--shadow);margin-bottom:20px;}
#mlt-root .panel-head{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;border-bottom:1px solid var(--rule);}
#mlt-root .panel-head h3{font-size:16px;}
#mlt-root .panel-body{padding:16px 18px;}

#mlt-root table{width:100%;border-collapse:collapse;font-size:13.5px;}
#mlt-root th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:0.6px;color:var(--ink-soft);font-weight:600;padding:6px 8px;border-bottom:1.5px solid var(--rule);}
#mlt-root td{padding:9px 8px;border-bottom:1px solid var(--rule);vertical-align:middle;}
#mlt-root tr:last-child td{border-bottom:none;}
#mlt-root tr.clickable{cursor:pointer;}
#mlt-root tr.clickable:hover{background:var(--amber-bg);}
#mlt-root .num{font-family:'IBM Plex Mono',monospace;text-align:right;}

#mlt-root .stamp{display:inline-block;font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;letter-spacing:0.6px;padding:3px 8px;border-radius:4px;text-transform:uppercase;}
#mlt-root .stamp.paid{background:var(--green-bg);color:var(--green);}
#mlt-root .stamp.overdue{background:var(--red-bg);color:var(--red);}
#mlt-root .stamp.partial{background:var(--amber-bg);color:var(--brass-deep);}
#mlt-root .stamp.pending{background:#EFECE3;color:var(--ink-soft);}
#mlt-root .stamp.active{background:var(--amber-bg);color:var(--brass-deep);}
#mlt-root .stamp.completed{background:var(--green-bg);color:var(--green);}

#mlt-root button.btn{
  font-family:'IBM Plex Sans',sans-serif;font-weight:600;font-size:13px;border-radius:6px;border:1px solid transparent;
  padding:8px 14px;cursor:pointer;transition:filter .15s, transform .05s;
}
#mlt-root button.btn:active{transform:scale(0.98);}
#mlt-root button.btn-primary{background:var(--brass);color:#1D1608;}
#mlt-root button.btn-primary:hover{filter:brightness(1.06);}
#mlt-root button.btn-ghost{background:none;border:1px solid var(--rule);color:var(--ink);}
#mlt-root button.btn-ghost:hover{background:var(--amber-bg);}
#mlt-root button.btn-danger{background:none;border:1px solid var(--red);color:var(--red);}
#mlt-root button.btn-danger:hover{background:var(--red-bg);}
#mlt-root button.btn-sm{padding:5px 10px;font-size:12px;}

#mlt-root input,#mlt-root select{
  font-family:'IBM Plex Sans',sans-serif;font-size:13.5px;padding:8px 10px;border:1px solid var(--rule);
  border-radius:6px;background:#fff;color:var(--ink);width:100%;
}
#mlt-root input.mono,#mlt-root .amt-input{font-family:'IBM Plex Mono',monospace;}
#mlt-root label{font-size:11.5px;font-weight:600;color:var(--ink-soft);text-transform:uppercase;letter-spacing:0.5px;display:block;margin-bottom:5px;}
#mlt-root .field{margin-bottom:14px;}
#mlt-root .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
#mlt-root .row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}

#mlt-root .empty{text-align:center;padding:36px 20px;color:var(--ink-soft);}
#mlt-root .empty .big{font-family:'Fraunces',serif;font-size:17px;color:var(--ink);margin-bottom:6px;}

#mlt-root .modal-backdrop{position:fixed;inset:0;background:rgba(34,40,31,0.45);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;}
#mlt-root .modal{background:var(--card);border-radius:10px;max-width:480px;width:100%;max-height:88vh;overflow-y:auto;box-shadow:0 12px 40px rgba(0,0,0,0.25);}
#mlt-root .modal-head{padding:16px 20px;border-bottom:1px solid var(--rule);display:flex;justify-content:space-between;align-items:center;}
#mlt-root .modal-body{padding:18px 20px;}
#mlt-root .modal-foot{padding:14px 20px;border-top:1px solid var(--rule);display:flex;justify-content:flex-end;gap:8px;}
#mlt-root .x-close{background:none;border:none;font-size:18px;color:var(--ink-soft);cursor:pointer;line-height:1;}

#mlt-root .hint{font-size:11.5px;color:var(--ink-soft);margin-top:4px;}
#mlt-root .breadcrumb{font-size:12px;color:var(--brass-deep);cursor:pointer;font-weight:600;margin-bottom:10px;display:inline-block;}
#mlt-root .breadcrumb:hover{text-decoration:underline;}
#mlt-root .client-tag{font-size:11.5px;color:var(--ink-soft);}
#mlt-root .installment-row.overdue td{background:rgba(161,61,46,0.04);}
#mlt-root .toast{position:fixed;bottom:20px;right:20px;background:var(--ink);color:#F6F3EC;padding:10px 16px;border-radius:7px;font-size:13px;box-shadow:var(--shadow);z-index:1100;}

@media (max-width:640px){
  #mlt-root .layout{flex-direction:column;}
  #mlt-root .sidebar{width:100%;flex-direction:row;overflow-x:auto;padding:12px;}
  #mlt-root .brand,#mlt-root .brand-sub{display:none;}
  #mlt-root .main{padding:16px;}
  #mlt-root .row2,#mlt-root .row3{grid-template-columns:1fr;}
}
</style>

<div id="mlt-login-screen" style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#F6F3EC;font-family:'IBM Plex Sans',sans-serif;padding:20px;">
  <div style="background:#FFFEFB;border:1px solid #DCD5C4;border-radius:10px;padding:32px 28px;max-width:340px;width:100%;box-shadow:0 4px 14px rgba(34,40,31,0.08);">
    <div style="font-family:'Fraunces',serif;font-size:22px;font-weight:700;color:#22281F;margin-bottom:4px;">Ledger</div>
    <div style="font-size:12px;color:#5C6355;text-transform:uppercase;letter-spacing:1px;margin-bottom:22px;">micro-loan tracker</div>
    <div style="margin-bottom:12px;">
      <label style="font-size:11.5px;font-weight:600;color:#5C6355;text-transform:uppercase;letter-spacing:0.5px;display:block;margin-bottom:5px;">Email</label>
      <input id="mlt-auth-email" type="email" style="width:100%;padding:9px 10px;border:1px solid #DCD5C4;border-radius:6px;font-size:14px;box-sizing:border-box;" placeholder="you@example.com"/>
    </div>
    <div style="margin-bottom:18px;">
      <label style="font-size:11.5px;font-weight:600;color:#5C6355;text-transform:uppercase;letter-spacing:0.5px;display:block;margin-bottom:5px;">Password</label>
      <input id="mlt-auth-password" type="password" style="width:100%;padding:9px 10px;border:1px solid #DCD5C4;border-radius:6px;font-size:14px;box-sizing:border-box;" placeholder="At least 6 characters"/>
    </div>
    <div id="mlt-auth-error" style="color:#A13D2E;font-size:12.5px;margin-bottom:12px;display:none;"></div>
    <button id="mlt-auth-signin" style="width:100%;padding:10px;background:#A97A2F;color:#1D1608;border:none;border-radius:6px;font-weight:600;font-size:14px;cursor:pointer;margin-bottom:8px;">Sign in</button>
    <button id="mlt-auth-signup" style="width:100%;padding:10px;background:none;color:#22281F;border:1px solid #DCD5C4;border-radius:6px;font-weight:600;font-size:14px;cursor:pointer;">Create account</button>
    <div style="font-size:11.5px;color:#5C6355;margin-top:14px;line-height:1.5;">First time here? Tap "Create account" with an email and password of your choice — this becomes your login on every device from now on.</div>
  </div>
</div>

<div id="mlt-root" style="display:none">
  <div class="layout">
    <div class="sidebar">
      <div class="brand">Ledger</div>
      <div class="brand-sub">micro-loan tracker</div>
      <button class="nav-btn" data-nav="dashboard">Dashboard</button>
      <button class="nav-btn" data-nav="loans">Loans</button>
      <button class="nav-btn" data-nav="clients">Clients</button>
      <button class="nav-btn" data-nav="reports">Reports</button>
      <div style="margin-top:auto;padding-top:14px;border-top:1px solid rgba(255,255,255,0.12)">
        <button class="nav-btn" id="mlt-backup-btn" style="font-size:12.5px">⬇ Backup / Restore</button>
        <button class="nav-btn" id="mlt-logout-btn" style="font-size:12.5px">↪ Sign out</button>
      </div>
    </div>
    <div class="main" id="mlt-main"></div>
  </div>
</div>

<script>
(function(){
  const root = document.getElementById('mlt-root');
  const mainEl = document.getElementById('mlt-main');
  let clients = [];
  let loans = [];
  let view = 'dashboard';
  let detailLoanId = null;
  let loaded = false;

  const fmt = n => '$' + (Math.round((n||0)*100)/100).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
  const pad2 = n => String(n).padStart(2,'0');
  const ymd = d => `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
  const todayStr = () => ymd(new Date());
  const uid = () => 'id-' + Date.now().toString(36) + Math.random().toString(36).slice(2,8);
  const addDays = (dateStr, days) => {
    const [y,m,dd] = dateStr.split('-').map(Number);
    const d = new Date(y, m-1, dd);
    d.setDate(d.getDate() + Math.round(days));
    return ymd(d);
  };
  const dfmt = s => { if(!s) return ''; const d = new Date(s+'T00:00:00'); return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); };

  const SEED_TEXT = `Ian Mugurungi 20(27)3 Frank muuya 30(20)3(25)10 Michael Musharu 20(30)3 Mai Jasi 150(35)1(20)3(20)6(20)10(20)13(20)17(20)20(20)24(20)27(20)31(25)3 Bennedict Rari 60(20)13(20)20(20)27(20)3(15)10 Muzengi Masimba 100(35)3(35)10(35)17(35)24`;
  const SEED_START_DATE = '2026-07-01';

  function userDocRef(){
    const currentUid = window.__fb.auth.currentUser.uid;
    return window.__fb.doc(window.__fb.db, 'users', currentUid);
  }
  function withTimeout(promise, ms, label){
    return Promise.race([
      promise,
      new Promise((_, reject)=>setTimeout(()=>reject(new Error('timeout:'+label)), ms))
    ]);
  }
  async function loadAll(){
    try{
      const snap = await withTimeout(window.__fb.getDoc(userDocRef()), 12000, 'load');
      if(snap.exists()){
        const data = snap.data();
        clients = data.clients || [];
        loans = data.loans || [];
      } else {
        clients = []; loans = [];
      }
    }catch(e){
      clients = []; loans = [];
      if(String(e.message).includes('timeout')) toast('Loading timed out — your connection may be too slow or unstable right now');
      else toast('Could not load your data — check your internet connection');
    }
    loaded = true;
  }
  function loadSeedData(){
    const parsed = parseShorthandBlock(SEED_TEXT, SEED_START_DATE);
    parsed.forEach(p=>{
      const client = {id: uid(), name: p.name, workplace:'', phone:''};
      clients.push(client);
      loans.push({
        id: uid(), clientId: client.id, principal: p.principal, interestRate: p.rate, term:'custom',
        startDate: SEED_START_DATE, dueDate: p.installments.length ? p.installments[p.installments.length-1].dueDate : SEED_START_DATE,
        totalPayable: p.totalPayable, installments: p.installments, notes: 'Starting balance'
      });
    });
    saveClients(); saveLoans();
  }
  async function saveToCloud(){
    try{
      await withTimeout(window.__fb.setDoc(userDocRef(), {clients, loans, updatedAt: new Date().toISOString()}), 12000, 'save');
      toast('Saved');
    }catch(e){
      if(String(e.message).includes('timeout')) toast('Save timed out — your connection may be too slow or unstable right now');
      else toast('Save failed — check your internet connection');
    }
  }
  async function saveClients(){ await saveToCloud(); }
  async function saveLoans(){ await saveToCloud(); }



  function toast(msg){
    const t = document.createElement('div');
    t.className = 'toast'; t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(()=>t.remove(), 2200);
  }

  function clientById(id){ return clients.find(c=>c.id===id); }
  function loanClientName(loan){ const c = clientById(loan.clientId); return c ? c.name : 'Unknown'; }

  function loanTotals(loan){
    const paid = loan.installments.reduce((s,i)=>s+(i.paidAmount||0),0);
    const outstanding = Math.max(0, loan.totalPayable - paid);
    const interestTotal = loan.totalPayable - loan.principal;
    const collectionRatio = loan.totalPayable > 0 ? Math.min(1, paid/loan.totalPayable) : 0;
    const interestCollected = interestTotal * collectionRatio;
    const overdueInstallments = loan.installments.filter(i => i.dueDate < todayStr() && (i.paidAmount||0) < i.amount);
    const overdueAmount = overdueInstallments.reduce((s,i)=>s+(i.amount-(i.paidAmount||0)),0);
    let status = 'active';
    if(outstanding <= 0.005) status = 'completed';
    else if(overdueInstallments.length>0) status = 'overdue';
    return {paid, outstanding, interestTotal, interestCollected, overdueAmount, overdueCount: overdueInstallments.length, status};
  }

  function dashboardStats(){
    let outstanding=0, principalOut=0, interestCollected=0, overdueAmt=0, overdueLoans=0, activeLoans=0;
    loans.forEach(l=>{
      const t = loanTotals(l);
      if(t.status !== 'completed'){ outstanding += t.outstanding; activeLoans++; }
      interestCollected += t.interestCollected;
      if(t.overdueCount>0){ overdueAmt += t.overdueAmount; overdueLoans++; }
    });
    return {outstanding, interestCollected, overdueAmt, overdueLoans, activeLoans, totalClients: clients.length};
  }

  // ---------- RENDER ----------
  function render(){
    if(!loaded){ mainEl.innerHTML = '<div class="empty">Loading your ledger…</div>'; return; }
    root.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active', b.dataset.nav===view));
    if(view==='dashboard') renderDashboard();
    else if(view==='clients') renderClients();
    else if(view==='loans') renderLoans();
    else if(view==='loanDetail') renderLoanDetail();
    else if(view==='reports') renderReports();
  }

  function nextWeekday(targetDow){
    // targetDow: 0=Sun,1=Mon,...5=Fri,6=Sat. Returns today if today matches, else the next occurrence.
    const d = new Date();
    const diff = (targetDow - d.getDay() + 7) % 7;
    d.setDate(d.getDate() + diff);
    return ymd(d);
  }

  function installmentsDueOn(dateStr){
    const rows = [];
    loans.forEach(l=>{
      l.installments.forEach((inst,idx)=>{
        const balance = Math.round((inst.amount-(inst.paidAmount||0))*100)/100;
        if(inst.dueDate===dateStr && balance>0.005){
          rows.push({loan:l, inst, idx, balance});
        }
      });
    });
    return rows.sort((a,b)=>loanClientName(a.loan).localeCompare(loanClientName(b.loan)));
  }

  function installmentsDueBetween(startStr, endStr){
    const rows = [];
    loans.forEach(l=>{
      l.installments.forEach((inst,idx)=>{
        const balance = Math.round((inst.amount-(inst.paidAmount||0))*100)/100;
        if(inst.dueDate>=startStr && inst.dueDate<=endStr && balance>0.005){
          rows.push({loan:l, inst, idx, balance});
        }
      });
    });
    return rows.sort((a,b)=> a.inst.dueDate===b.inst.dueDate ? loanClientName(a.loan).localeCompare(loanClientName(b.loan)) : a.inst.dueDate.localeCompare(b.inst.dueDate));
  }

  function dayLabel(dateStr){
    if(dateStr===todayStr()) return 'Today · ' + dfmt(dateStr);
    return new Date(dateStr+'T00:00:00').toLocaleDateString('en-US',{weekday:'long'}) + ' · ' + dfmt(dateStr);
  }

  function reportTable(rows, emptyMsg){
    if(rows.length===0) return `<div class="empty">${emptyMsg}</div>`;
    const total = rows.reduce((s,r)=>s+r.balance,0);
    return `
      <table><thead><tr><th>Client</th><th>Due</th><th class="num">Amount due</th><th></th></tr></thead><tbody>
      ${rows.map(r=>`<tr class="clickable" data-open-loan="${r.loan.id}">
        <td>${loanClientName(r.loan)}</td>
        <td class="mono">${dfmt(r.inst.dueDate)}</td>
        <td class="num mono">${fmt(r.balance)}</td>
        <td style="text-align:right"><button class="btn btn-ghost btn-sm" data-pay-report="${r.loan.id}|${r.idx}">Record payment</button></td>
      </tr>`).join('')}
      </tbody></table>
      <div style="text-align:right;margin-top:10px;padding-top:10px;border-top:1px solid var(--rule)">
        <span class="label" style="display:inline;text-transform:uppercase">Total </span>
        <span class="mono" style="font-weight:600;font-size:15px">${fmt(total)}</span>
      </div>`;
  }

  function renderReports(){
    const fri = nextWeekday(5);
    const mon = nextWeekday(1);
    const friRows = installmentsDueOn(fri);
    const monRows = installmentsDueOn(mon);
    const twoWeeksOut = addDays(todayStr(), 14);
    const upcomingRows = installmentsDueBetween(todayStr(), twoWeeksOut);
    const overdueRows = installmentsDueBetween('2000-01-01', addDays(todayStr(),-1));

    mainEl.innerHTML = `
      <div class="topline"><h1>Reports</h1><span class="today mono">${dfmt(todayStr())}</span></div>

      <div class="row2" style="margin-bottom:20px">
        <div class="panel" style="margin-bottom:0">
          <div class="panel-head"><h3>Due ${dayLabel(fri)}</h3></div>
          <div class="panel-body">${reportTable(friRows, 'Nothing due this Friday.')}</div>
        </div>
        <div class="panel" style="margin-bottom:0">
          <div class="panel-head"><h3>Due ${dayLabel(mon)}</h3></div>
          <div class="panel-body">${reportTable(monRows, 'Nothing due this Monday.')}</div>
        </div>
      </div>

      ${overdueRows.length>0 ? `
      <div class="panel">
        <div class="panel-head"><h3>Overdue</h3></div>
        <div class="panel-body">${reportTable(overdueRows, '')}</div>
      </div>` : ''}

      <div class="panel">
        <div class="panel-head"><h3>Everything due in the next 14 days</h3></div>
        <div class="panel-body">${reportTable(upcomingRows, 'Nothing due in the next two weeks.')}</div>
      </div>
    `;
    mainEl.querySelectorAll('[data-open-loan]').forEach(el=>{
      el.addEventListener('click', (e)=>{
        if(e.target.closest('[data-pay-report]')) return;
        detailLoanId = el.dataset.openLoan; view='loanDetail'; render();
      });
    });
    mainEl.querySelectorAll('[data-pay-report]').forEach(el=>{
      el.addEventListener('click', (e)=>{
        e.stopPropagation();
        const [loanId, idx] = el.dataset.payReport.split('|');
        const loan = loans.find(l=>l.id===loanId);
        openPaymentModal(loan, parseInt(idx));
      });
    });
  }

  function renderDashboard(){
    const s = dashboardStats();
    const overdueLoansList = loans.filter(l=>loanTotals(l).overdueCount>0)
      .sort((a,b)=>loanTotals(b).overdueAmount - loanTotals(a).overdueAmount);

    mainEl.innerHTML = `
      <div class="topline"><h1>Dashboard</h1><span class="today mono">${dfmt(todayStr())}</span></div>
      ${clients.length===0 ? `
      <div class="panel" style="border-color:var(--brass)">
        <div class="panel-body">
          <div class="empty">
            <div class="big">This ledger is empty</div>
            No clients or loans are saved here yet. If you expected data to be here, you may be viewing a different copy of the file than the one you last saved to — check <b>Backup / Restore</b> in the sidebar to restore from a backup file, or use <b>Clients → Paste from notes</b> to re-enter your records.
          </div>
        </div>
      </div>` : ''}
      <div class="cards">
        <div class="card"><div class="label">Outstanding</div><div class="value">${fmt(s.outstanding)}</div></div>
        <div class="card good"><div class="label">Interest earned</div><div class="value">${fmt(s.interestCollected)}</div></div>
        <div class="card ${s.overdueAmt>0?'warn':''}"><div class="label">Overdue</div><div class="value">${fmt(s.overdueAmt)}</div></div>
        <div class="card"><div class="label">Active loans</div><div class="value">${s.activeLoans}</div></div>
        <div class="card"><div class="label">Clients</div><div class="value">${s.totalClients}</div></div>
      </div>
      <div class="panel">
        <div class="panel-head"><h3>Needs attention</h3></div>
        <div class="panel-body">
          ${overdueLoansList.length===0 ? `<div class="empty"><div class="big">Nothing overdue</div>All installments are on schedule.</div>` : `
          <table><thead><tr><th>Client</th><th>Loan</th><th class="num">Overdue</th><th></th></tr></thead><tbody>
          ${overdueLoansList.map(l=>{
            const t = loanTotals(l);
            return `<tr class="clickable" data-open-loan="${l.id}">
              <td>${loanClientName(l)}</td>
              <td class="mono">${fmt(l.principal)} · ${dfmt(l.startDate)}</td>
              <td class="num mono" style="color:var(--red)">${fmt(t.overdueAmount)}</td>
              <td><span class="stamp overdue">${t.overdueCount} due</span></td>
            </tr>`;
          }).join('')}
          </tbody></table>`}
        </div>
      </div>
      <div class="panel">
        <div class="panel-head"><h3>Recent loans</h3><button class="btn btn-primary btn-sm" id="mlt-new-loan-dash">+ New loan</button></div>
        <div class="panel-body">
          ${loans.length===0 ? `<div class="empty"><div class="big">No loans yet</div>Add a client, then issue their first loan.</div>` : `
          <table><thead><tr><th>Client</th><th class="num">Principal</th><th class="num">Payable</th><th class="num">Outstanding</th><th>Status</th></tr></thead><tbody>
          ${loans.slice().sort((a,b)=>b.startDate.localeCompare(a.startDate)).slice(0,6).map(l=>{
            const t = loanTotals(l);
            return `<tr class="clickable" data-open-loan="${l.id}">
              <td>${loanClientName(l)}</td>
              <td class="num mono">${fmt(l.principal)}</td>
              <td class="num mono">${fmt(l.totalPayable)}</td>
              <td class="num mono">${fmt(t.outstanding)}</td>
              <td><span class="stamp ${t.status}">${t.status}</span></td>
            </tr>`;
          }).join('')}
          </tbody></table>`}
        </div>
      </div>
    `;
    mainEl.querySelectorAll('[data-open-loan]').forEach(el=>el.addEventListener('click', ()=>{ detailLoanId = el.dataset.openLoan; view='loanDetail'; render(); }));
    const nb = document.getElementById('mlt-new-loan-dash');
    if(nb) nb.addEventListener('click', openNewLoanModal);
  }

  function renderClients(){
    mainEl.innerHTML = `
      <div class="topline"><h1>Clients</h1><div style="display:flex;gap:8px"><button class="btn btn-ghost" id="mlt-import-notes">Paste from notes</button><button class="btn btn-primary" id="mlt-add-client">+ Add client</button></div></div>
      <div class="panel"><div class="panel-body">
        ${clients.length===0 ? `<div class="empty"><div class="big">No clients yet</div>Add a colleague to start lending.</div>` : `
        <table><thead><tr><th>Name</th><th>Workplace / dept</th><th>Phone</th><th class="num">Active loans</th><th></th></tr></thead><tbody>
        ${clients.map(c=>{
          const clientLoans = loans.filter(l=>l.clientId===c.id);
          const active = clientLoans.filter(l=>loanTotals(l).status!=='completed').length;
          return `<tr>
            <td>${escapeHtml(c.name)}</td>
            <td class="client-tag">${escapeHtml(c.workplace||'—')}</td>
            <td class="client-tag mono">${escapeHtml(c.phone||'—')}</td>
            <td class="num">${active}</td>
            <td style="text-align:right"><button class="btn btn-ghost btn-sm" data-del-client="${c.id}">Remove</button></td>
          </tr>`;
        }).join('')}
        </tbody></table>`}
      </div></div>
    `;
    document.getElementById('mlt-add-client').addEventListener('click', openAddClientModal);
    document.getElementById('mlt-import-notes').addEventListener('click', openImportModal);
    mainEl.querySelectorAll('[data-del-client]').forEach(el=>el.addEventListener('click', ()=>{
      const id = el.dataset.delClient;
      const hasLoans = loans.some(l=>l.clientId===id);
      if(hasLoans){ toast("Can't remove — client has loan history"); return; }
      clients = clients.filter(c=>c.id!==id);
      saveClients(); render();
    }));
  }

  function renderLoans(){
    mainEl.innerHTML = `
      <div class="topline"><h1>Loans</h1><button class="btn btn-primary" id="mlt-add-loan">+ New loan</button></div>
      <div class="panel"><div class="panel-body">
        ${loans.length===0 ? `<div class="empty"><div class="big">No loans yet</div>Issue your first loan to a client.</div>` : `
        <table><thead><tr><th>Client</th><th class="num">Principal</th><th class="num">Rate</th><th class="num">Payable</th><th class="num">Outstanding</th><th>Status</th></tr></thead><tbody>
        ${loans.slice().sort((a,b)=>b.startDate.localeCompare(a.startDate)).map(l=>{
          const t = loanTotals(l);
          return `<tr class="clickable" data-open-loan="${l.id}">
            <td>${loanClientName(l)}</td>
            <td class="num mono">${fmt(l.principal)}</td>
            <td class="num mono">${l.interestRate}%</td>
            <td class="num mono">${fmt(l.totalPayable)}</td>
            <td class="num mono">${fmt(t.outstanding)}</td>
            <td><span class="stamp ${t.status}">${t.status}</span></td>
          </tr>`;
        }).join('')}
        </tbody></table>`}
      </div></div>
    `;
    document.getElementById('mlt-add-loan').addEventListener('click', openNewLoanModal);
    mainEl.querySelectorAll('[data-open-loan]').forEach(el=>el.addEventListener('click', ()=>{ detailLoanId = el.dataset.openLoan; view='loanDetail'; render(); }));
  }

  function renderLoanDetail(){
    const loan = loans.find(l=>l.id===detailLoanId);
    if(!loan){ view='loans'; render(); return; }
    const t = loanTotals(loan);
    mainEl.innerHTML = `
      <span class="breadcrumb" id="mlt-back">← Back to loans</span>
      <div class="topline">
        <h1>${loanClientName(loan)}</h1>
        <span class="stamp ${t.status}">${t.status}</span>
      </div>
      <div class="cards">
        <div class="card"><div class="label">Principal</div><div class="value">${fmt(loan.principal)}</div></div>
        <div class="card"><div class="label">Total payable</div><div class="value">${fmt(loan.totalPayable)}</div></div>
        <div class="card"><div class="label">Outstanding</div><div class="value">${fmt(t.outstanding)}</div></div>
        <div class="card good"><div class="label">Interest earned</div><div class="value">${fmt(t.interestCollected)}</div></div>
      </div>
      <div class="panel">
        <div class="panel-head"><h3>Loan terms</h3></div>
        <div class="panel-body">
          <div class="row3">
            <div><div class="label">Rate</div><div class="mono">${loan.interestRate}% flat</div></div>
            <div><div class="label">Term</div><div class="mono">${dfmt(loan.startDate)} → ${dfmt(loan.dueDate)}</div></div>
            <div><div class="label">Installments</div><div class="mono">${loan.installments.length}</div></div>
          </div>
          ${loan.notes ? `<div class="hint" style="margin-top:10px">${escapeHtml(loan.notes)}</div>` : ''}
        </div>
      </div>
      <div class="panel">
        <div class="panel-head"><h3>Repayment schedule</h3></div>
        <div class="panel-body">
          <table><thead><tr><th>Due</th><th class="num">Amount</th><th class="num">Paid</th><th>Status</th><th></th></tr></thead><tbody>
          ${loan.installments.map((inst,idx)=>{
            const paid = inst.paidAmount||0;
            const isOverdue = inst.dueDate < todayStr() && paid < inst.amount;
            let stampClass = 'pending', stampLabel='pending';
            if(paid >= inst.amount) { stampClass='paid'; stampLabel='paid'; }
            else if(paid > 0){ stampClass='partial'; stampLabel='partial'; }
            else if(isOverdue){ stampClass='overdue'; stampLabel='overdue'; }
            return `<tr class="${isOverdue?'installment-row overdue':''}">
              <td class="mono">${dfmt(inst.dueDate)}</td>
              <td class="num mono">${fmt(inst.amount)}</td>
              <td class="num mono">${fmt(paid)}</td>
              <td><span class="stamp ${stampClass}">${stampLabel}</span></td>
              <td style="text-align:right">${paid < inst.amount ? `<button class="btn btn-ghost btn-sm" data-pay-inst="${idx}">Record payment</button>` : ''}</td>
            </tr>`;
          }).join('')}
          </tbody></table>
        </div>
      </div>
      <button class="btn btn-danger btn-sm" id="mlt-delete-loan">Delete loan</button>
    `;
    document.getElementById('mlt-back').addEventListener('click', ()=>{ view='loans'; render(); });
    document.getElementById('mlt-delete-loan').addEventListener('click', ()=>{
      if(confirm('Delete this loan permanently? This cannot be undone.')){
        loans = loans.filter(l=>l.id!==loan.id);
        saveLoans(); view='loans'; render();
      }
    });
    mainEl.querySelectorAll('[data-pay-inst]').forEach(el=>el.addEventListener('click', ()=>{
      openPaymentModal(loan, parseInt(el.dataset.payInst));
    }));
  }

  function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  // ---------- MODALS ----------
  function closeModal(){ const m = document.getElementById('mlt-modal-backdrop'); if(m) m.remove(); }

  function openAddClientModal(){
    const wrap = document.createElement('div');
    wrap.id = 'mlt-modal-backdrop'; wrap.className = 'modal-backdrop';
    wrap.innerHTML = `
      <div class="modal">
        <div class="modal-head"><h3>Add client</h3><button class="x-close" id="mlt-modal-x">&times;</button></div>
        <div class="modal-body">
          <div class="field"><label>Name</label><input id="mlt-c-name" placeholder="e.g. Tendai Moyo"/></div>
          <div class="field"><label>Workplace / department</label><input id="mlt-c-work" placeholder="e.g. Warehouse"/></div>
          <div class="field"><label>Phone</label><input id="mlt-c-phone" placeholder="e.g. 077 123 4567"/></div>
        </div>
        <div class="modal-foot"><button class="btn btn-ghost" id="mlt-modal-cancel">Cancel</button><button class="btn btn-primary" id="mlt-modal-save">Save client</button></div>
      </div>`;
    document.body.appendChild(wrap);
    document.getElementById('mlt-modal-x').addEventListener('click', closeModal);
    document.getElementById('mlt-modal-cancel').addEventListener('click', closeModal);
    document.getElementById('mlt-modal-save').addEventListener('click', ()=>{
      const name = document.getElementById('mlt-c-name').value.trim();
      if(!name){ toast('Name is required'); return; }
      clients.push({id: uid(), name, workplace: document.getElementById('mlt-c-work').value.trim(), phone: document.getElementById('mlt-c-phone').value.trim()});
      saveClients(); closeModal(); view='clients'; render();
    });
  }

  function openNewLoanModal(){
    if(clients.length===0){ toast('Add a client first'); openAddClientModal(); return; }
    let instRows = [{amount:'', date: todayStr()}];

    const wrap = document.createElement('div');
    wrap.id = 'mlt-modal-backdrop'; wrap.className = 'modal-backdrop';
    wrap.innerHTML = `
      <div class="modal">
        <div class="modal-head"><h3>New loan</h3><button class="x-close" id="mlt-modal-x">&times;</button></div>
        <div class="modal-body">
          <div class="field"><label>Client</label>
            <select id="mlt-l-client">${clients.map(c=>`<option value="${c.id}">${escapeHtml(c.name)}</option>`).join('')}</select>
          </div>
          <div class="row2">
            <div class="field"><label>Principal ($)</label><input class="amt-input" id="mlt-l-principal" type="number" step="0.01" value="100"/></div>
            <div class="field"><label>Start date</label><input id="mlt-l-start" type="date" value="${todayStr()}"/></div>
          </div>
          <div class="field">
            <label>Repayment installments — enter what was agreed</label>
            <div id="mlt-l-inst-rows"></div>
            <button type="button" class="btn btn-ghost btn-sm" id="mlt-l-add-row" style="margin-top:6px">+ Add installment</button>
          </div>
          <div class="row2">
            <div class="field"><label>Total payable</label><div class="mono" id="mlt-l-total" style="font-size:18px;font-weight:600;color:var(--brass-deep)">$0.00</div></div>
            <div class="field"><label>Effective rate</label><div class="mono" id="mlt-l-rate-display" style="font-size:18px;font-weight:600">—</div></div>
          </div>
          <div class="field"><label>Notes (optional)</label><input id="mlt-l-notes" placeholder="e.g. negotiated discount"/></div>
        </div>
        <div class="modal-foot"><button class="btn btn-ghost" id="mlt-modal-cancel">Cancel</button><button class="btn btn-primary" id="mlt-modal-save">Create loan</button></div>
      </div>`;
    document.body.appendChild(wrap);

    const principalInput = document.getElementById('mlt-l-principal');
    const totalDisplay = document.getElementById('mlt-l-total');
    const rateDisplay = document.getElementById('mlt-l-rate-display');
    const rowsEl = document.getElementById('mlt-l-inst-rows');

    function renderRows(){
      rowsEl.innerHTML = instRows.map((r,i)=>`
        <div class="row2" style="margin-bottom:8px;align-items:end">
          <div><label style="margin-bottom:3px">Amount ($)</label><input class="amt-input mlt-inst-amt" data-idx="${i}" type="number" step="0.01" value="${r.amount}" placeholder="0.00"/></div>
          <div style="display:flex;gap:6px;align-items:flex-end">
            <div style="flex:1"><label style="margin-bottom:3px">Due date</label><input class="mlt-inst-date" data-idx="${i}" type="date" value="${r.date}"/></div>
            ${instRows.length>1 ? `<button type="button" class="btn btn-ghost btn-sm mlt-inst-remove" data-idx="${i}" style="padding:8px 10px">×</button>` : ''}
          </div>
        </div>`).join('');
      rowsEl.querySelectorAll('.mlt-inst-amt').forEach(el=>el.addEventListener('input', e=>{
        instRows[+e.target.dataset.idx].amount = e.target.value; updateTotal();
      }));
      rowsEl.querySelectorAll('.mlt-inst-date').forEach(el=>el.addEventListener('input', e=>{
        instRows[+e.target.dataset.idx].date = e.target.value;
      }));
      rowsEl.querySelectorAll('.mlt-inst-remove').forEach(el=>el.addEventListener('click', e=>{
        instRows.splice(+e.target.dataset.idx, 1); renderRows(); updateTotal();
      }));
    }
    function updateTotal(){
      const p = parseFloat(principalInput.value)||0;
      const total = instRows.reduce((s,r)=>s+(parseFloat(r.amount)||0),0);
      totalDisplay.textContent = fmt(total);
      rateDisplay.textContent = p>0 ? `${Math.round(((total-p)/p)*1000)/10}%` : '—';
    }
    document.getElementById('mlt-l-add-row').addEventListener('click', ()=>{
      const lastDate = instRows.length ? instRows[instRows.length-1].date : todayStr();
      instRows.push({amount:'', date: lastDate});
      renderRows(); updateTotal();
    });
    principalInput.addEventListener('input', updateTotal);
    renderRows(); updateTotal();

    document.getElementById('mlt-modal-x').addEventListener('click', closeModal);
    document.getElementById('mlt-modal-cancel').addEventListener('click', closeModal);
    document.getElementById('mlt-modal-save').addEventListener('click', ()=>{
      const principal = parseFloat(principalInput.value);
      const start = document.getElementById('mlt-l-start').value || todayStr();
      if(!principal || principal<=0){ toast('Enter a valid principal'); return; }
      const installments = instRows
        .filter(r=>parseFloat(r.amount)>0 && r.date)
        .map(r=>({amount: Math.round(parseFloat(r.amount)*100)/100, paidAmount:0, paidDate:null, dueDate: r.date}))
        .sort((a,b)=>a.dueDate.localeCompare(b.dueDate));
      if(installments.length===0){ toast('Add at least one installment with an amount and date'); return; }
      const totalPayable = Math.round(installments.reduce((s,i)=>s+i.amount,0)*100)/100;
      const rate = Math.round(((totalPayable-principal)/principal)*1000)/10;
      loans.push({
        id: uid(), clientId: document.getElementById('mlt-l-client').value,
        principal, interestRate: rate, term:'custom', startDate: start,
        dueDate: installments[installments.length-1].dueDate,
        totalPayable, installments, notes: document.getElementById('mlt-l-notes').value.trim()
      });
      saveLoans(); closeModal(); view='loans'; render();
    });
  }

  function openPaymentModal(loan, instIdx){
    const inst = loan.installments[instIdx];
    const remaining = Math.round((inst.amount - (inst.paidAmount||0))*100)/100;
    const wrap = document.createElement('div');
    wrap.id = 'mlt-modal-backdrop'; wrap.className = 'modal-backdrop';
    wrap.innerHTML = `
      <div class="modal">
        <div class="modal-head"><h3>Record payment</h3><button class="x-close" id="mlt-modal-x">&times;</button></div>
        <div class="modal-body">
          <div class="hint" style="margin-bottom:12px">Installment due ${dfmt(inst.dueDate)} · balance ${fmt(remaining)}</div>
          <div class="field"><label>Amount received ($)</label><input class="amt-input" id="mlt-pay-amt" type="number" step="0.01" value="${remaining}"/></div>
          <div class="field"><label>Date received</label><input id="mlt-pay-date" type="date" value="${todayStr()}"/></div>
        </div>
        <div class="modal-foot"><button class="btn btn-ghost" id="mlt-modal-cancel">Cancel</button><button class="btn btn-primary" id="mlt-modal-save">Save payment</button></div>
      </div>`;
    document.body.appendChild(wrap);
    document.getElementById('mlt-modal-x').addEventListener('click', closeModal);
    document.getElementById('mlt-modal-cancel').addEventListener('click', closeModal);
    document.getElementById('mlt-modal-save').addEventListener('click', ()=>{
      const amt = parseFloat(document.getElementById('mlt-pay-amt').value);
      if(!amt || amt<=0){ toast('Enter a valid amount'); return; }
      inst.paidAmount = Math.round(((inst.paidAmount||0)+amt)*100)/100;
      inst.paidDate = document.getElementById('mlt-pay-date').value || todayStr();
      saveLoans(); closeModal(); render();
    });
  }

  // ---------- SHORTHAND IMPORT ----------
  // Parses lines like: "Frank muuya 30(20)3(25)10" -> principal 30, $20 due day3, $25 due day10
  // Day numbers auto roll into the next month whenever a day is smaller than the one before it.
  function parseShorthandBlock(text, startDateStr){
    // Scans the whole pasted blob for repeating 'Name amount(inst)day(inst)day...' segments.
    // Does not depend on line breaks surviving the paste (mobile clipboards often strip them).
    const results = [];
    const startD = new Date(startDateStr+'T00:00:00');
    const re = /([A-Za-z][A-Za-z .'-]*?)\s+([\d.]+)\s*((?:\(\s*[\d.]+\s*\)\s*\d+\s*)*)/g;
    let match;
    while((match = re.exec(text)) !== null){
      const name = match[1].trim();
      const principal = parseFloat(match[2]);
      if(!name || isNaN(principal)) continue;
      const instBlock = match[3];
      const instMatches = [...instBlock.matchAll(/\(\s*([\d.]+)\s*\)\s*(\d+)/g)];
      let year = startD.getFullYear(), month = startD.getMonth()+1, lastDay = startD.getDate();
      const installments = [];
      instMatches.forEach(im=>{
        const amt = parseFloat(im[1]);
        const day = parseInt(im[2]);
        if(day < lastDay){ month++; if(month>12){ month=1; year++; } }
        lastDay = day;
        const dueDate = `${year}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
        installments.push({amount: amt, paidAmount:0, paidDate:null, dueDate});
      });
      const totalPayable = installments.length ? Math.round(installments.reduce((s,i)=>s+i.amount,0)*100)/100 : principal;
      const rate = principal>0 ? Math.round(((totalPayable-principal)/principal)*1000)/10 : 0;
      results.push({raw: `${name} ${principal}`, name, principal, installments, totalPayable, rate});
    }
    return results;
  }

  function openImportModal(){
    const wrap = document.createElement('div');
    wrap.id = 'mlt-modal-backdrop'; wrap.className = 'modal-backdrop';
    wrap.innerHTML = `
      <div class="modal" style="max-width:600px">
        <div class="modal-head"><h3>Paste from notes</h3><button class="x-close" id="mlt-modal-x">&times;</button></div>
        <div class="modal-body">
          <div class="hint" style="margin-bottom:10px">One client per line: <span class="mono">Name principal(installment)day(installment)day...</span> — e.g. <span class="mono">Frank muuya 30(20)3(25)10</span></div>
          <div class="field"><label>Loan start date (used to figure out which month each day belongs to)</label><input id="mlt-imp-start" type="date" value="${todayStr()}"/></div>
          <div class="field"><label>Notes</label><textarea id="mlt-imp-text" rows="8" style="width:100%;font-family:'IBM Plex Mono',monospace;font-size:13px;padding:10px;border:1px solid var(--rule);border-radius:6px;"></textarea></div>
          <button class="btn btn-ghost btn-sm" id="mlt-imp-preview">Preview</button>
          <div id="mlt-imp-results" style="margin-top:14px"></div>
        </div>
        <div class="modal-foot"><button class="btn btn-ghost" id="mlt-modal-cancel">Cancel</button><button class="btn btn-primary" id="mlt-imp-confirm" style="display:none">Import all</button></div>
      </div>`;
    document.body.appendChild(wrap);
    document.getElementById('mlt-modal-x').addEventListener('click', closeModal);
    document.getElementById('mlt-modal-cancel').addEventListener('click', closeModal);
    let parsed = [];
    document.getElementById('mlt-imp-preview').addEventListener('click', ()=>{
      const text = document.getElementById('mlt-imp-text').value;
      const start = document.getElementById('mlt-imp-start').value || todayStr();
      parsed = parseShorthandBlock(text, start);
      const box = document.getElementById('mlt-imp-results');
      if(parsed.length===0){ box.innerHTML = '<div class="hint">Nothing to preview yet.</div>'; return; }
      box.innerHTML = `<table><thead><tr><th>Client</th><th class="num">Principal</th><th class="num">Payable</th><th class="num">Rate</th><th>Schedule</th></tr></thead><tbody>
        ${parsed.map(p=>{
          if(p.error) return `<tr><td colspan="5" style="color:var(--red)">${escapeHtml(p.raw)} — ${p.error}</td></tr>`;
          const sched = p.installments.map(i=>`${fmt(i.amount)} on ${dfmt(i.dueDate)}`).join(', ') || '<span class="hint">no schedule</span>';
          return `<tr><td>${escapeHtml(p.name)}</td><td class="num mono">${fmt(p.principal)}</td><td class="num mono">${fmt(p.totalPayable)}</td><td class="num mono">${p.rate}%</td><td style="font-size:12px">${sched}</td></tr>`;
        }).join('')}
      </tbody></table>`;
      const hasValid = parsed.some(p=>!p.error);
      document.getElementById('mlt-imp-confirm').style.display = hasValid ? 'inline-block' : 'none';
    });
    document.getElementById('mlt-imp-confirm').addEventListener('click', ()=>{
      const start = document.getElementById('mlt-imp-start').value || todayStr();
      let created = 0;
      parsed.forEach(p=>{
        if(p.error) return;
        let client = clients.find(c=>c.name.toLowerCase()===p.name.toLowerCase());
        if(!client){ client = {id: uid(), name: p.name, workplace:'', phone:''}; clients.push(client); }
        loans.push({
          id: uid(), clientId: client.id, principal: p.principal, interestRate: p.rate, term:'custom',
          startDate: start, dueDate: p.installments.length ? p.installments[p.installments.length-1].dueDate : start,
          totalPayable: p.totalPayable, installments: p.installments, notes: 'Imported from notes'
        });
        created++;
      });
      saveClients(); saveLoans();
      closeModal(); toast(`Imported ${created} loan${created===1?'':'s'}`);
      view='loans'; render();
    });
  }


  // ---------- BACKUP / RESTORE ----------
  function exportBackup(){
    const data = {app:'Ledger-MicroLoanTracker', exportedAt: new Date().toISOString(), clients, loans};
    const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `ledger-backup-${todayStr()}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url), 2000);
    toast('Backup file downloaded');
  }

  function openBackupModal(){
    const wrap = document.createElement('div');
    wrap.id = 'mlt-modal-backdrop'; wrap.className = 'modal-backdrop';
    wrap.innerHTML = `
      <div class="modal">
        <div class="modal-head"><h3>Backup / Restore</h3><button class="x-close" id="mlt-modal-x">&times;</button></div>
        <div class="modal-body">
          <div class="field">
            <label>Save a backup</label>
            <div class="hint" style="margin-bottom:10px">Downloads a file with all your clients and loans. Save it to Google Drive, email it to yourself, or send it to your own WhatsApp — anywhere off this phone.</div>
            <button class="btn btn-primary btn-sm" id="mlt-do-export">Download backup</button>
          </div>
          <div class="field" style="margin-top:22px;padding-top:18px;border-top:1px solid var(--rule)">
            <label>Restore from a backup</label>
            <div class="hint" style="margin-bottom:10px">This replaces everything currently in the app with what's in the backup file. Only do this if you're sure.</div>
            <input type="file" id="mlt-restore-file" accept="application/json"/>
          </div>
          <div class="field" style="margin-top:22px;padding-top:18px;border-top:1px solid var(--rule)">
            <label>Load original starting data</label>
            <div class="hint" style="margin-bottom:10px">Only use this if the ledger is empty and you have no backup file — this re-adds your original 6 clients (Ian, Frank, Michael, Mai Jasi, Bennedict, Muzengi) with zero payments recorded. It will NOT undo anything already paid.</div>
            <button class="btn btn-ghost btn-sm" id="mlt-load-seed">Load starting 6 clients</button>
          </div>
        </div>
        <div class="modal-foot"><button class="btn btn-ghost" id="mlt-modal-cancel">Close</button></div>
      </div>`;
    document.body.appendChild(wrap);
    document.getElementById('mlt-modal-x').addEventListener('click', closeModal);
    document.getElementById('mlt-modal-cancel').addEventListener('click', closeModal);
    document.getElementById('mlt-do-export').addEventListener('click', exportBackup);
    document.getElementById('mlt-load-seed').addEventListener('click', ()=>{
      if(clients.length>0){ if(!confirm('You already have clients saved. This will ADD the original 6 on top of what you have — could create duplicates. Continue?')) return; }
      else if(!confirm('Load the original 6 starting clients with zero payments recorded?')) return;
      loadSeedData(); closeModal(); toast('Starting data loaded'); view='dashboard'; render();
    });
    document.getElementById('mlt-restore-file').addEventListener('change', (e)=>{
      const file = e.target.files[0];
      if(!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        let data;
        try{ data = JSON.parse(reader.result); }catch(err){ toast('That file is not a valid backup'); return; }
        if(!data || !Array.isArray(data.clients) || !Array.isArray(data.loans)){ toast('That file is not a valid backup'); return; }
        if(!confirm(`Replace everything currently in the app with this backup (${data.clients.length} clients, ${data.loans.length} loans)? This cannot be undone.`)) return;
        clients = data.clients; loans = data.loans;
        saveClients(); saveLoans();
        closeModal(); toast('Backup restored'); view='dashboard'; render();
      };
      reader.readAsText(file);
    });
  }

  root.querySelectorAll('.nav-btn').forEach(b=>b.addEventListener('click', ()=>{ if(!b.dataset.nav) return; view=b.dataset.nav; detailLoanId=null; render(); }));
  document.getElementById('mlt-backup-btn').addEventListener('click', openBackupModal);

  // ---------- AUTH ----------
  const loginScreen = document.getElementById('mlt-login-screen');
  const emailInput = document.getElementById('mlt-auth-email');
  const passwordInput = document.getElementById('mlt-auth-password');
  const errorBox = document.getElementById('mlt-auth-error');

  function showAuthError(msg){ errorBox.textContent = msg; errorBox.style.display = 'block'; }
  function clearAuthError(){ errorBox.style.display = 'none'; }
  function friendlyAuthError(e){
    const code = (e && e.code) || '';
    if(code.includes('invalid-email')) return 'That email address doesn\'t look right.';
    if(code.includes('user-not-found') || code.includes('wrong-password') || code.includes('invalid-credential')) return 'Email or password is incorrect.';
    if(code.includes('email-already-in-use')) return 'An account with that email already exists — try Sign in instead.';
    if(code.includes('weak-password')) return 'Password needs to be at least 6 characters.';
    if(code.includes('network-request-failed')) return 'No internet connection — check your data/wifi and try again.';
    return 'Something went wrong. Please try again.';
  }

  function initAuthUI(){
    document.getElementById('mlt-auth-signin').addEventListener('click', async ()=>{
      clearAuthError();
      try{
        await window.__fb.signInWithEmailAndPassword(window.__fb.auth, emailInput.value.trim(), passwordInput.value);
      }catch(e){ showAuthError(friendlyAuthError(e)); }
    });
    document.getElementById('mlt-auth-signup').addEventListener('click', async ()=>{
      clearAuthError();
      try{
        await window.__fb.createUserWithEmailAndPassword(window.__fb.auth, emailInput.value.trim(), passwordInput.value);
      }catch(e){ showAuthError(friendlyAuthError(e)); }
    });
    document.getElementById('mlt-logout-btn').addEventListener('click', async ()=>{
      if(!confirm('Sign out?')) return;
      await window.__fb.signOut(window.__fb.auth);
    });

    window.__fb.onAuthStateChanged(window.__fb.auth, async (user)=>{
      if(user){
        loginScreen.style.display = 'none';
        root.style.display = '';
        await loadAll();
        render();
      } else {
        root.style.display = 'none';
        loginScreen.style.display = 'flex';
        clients = []; loans = []; loaded = false;
      }
    });
  }

  if(window.__fb){ initAuthUI(); }
  else { window.addEventListener('fbready', initAuthUI, {once:true}); }
})();
</script>
